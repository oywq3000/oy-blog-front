<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- SEO Meta Tags -->
    <meta name="description" content="OY Blog - A modern full-stack personal blog platform built with Vue 3 and Spring Boot. Share your thoughts, ideas, and knowledge with the world." />
    <meta name="keywords" content="blog, vue, spring boot, full-stack, developer, programming, technology" />
    <meta name="author" content="OY Blog" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://blog.lxsweb.top" />

    <!-- Open Graph / Social -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="OY Blog" />
    <meta property="og:description" content="A modern full-stack personal blog platform. Share your thoughts, ideas, and knowledge with the world." />
    <meta property="og:image" content="/logo.svg" />
    <meta property="og:url" content="https://blog.lxsweb.top" />
    <meta property="og:site_name" content="OY Blog" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="OY Blog" />
    <meta name="twitter:description" content="A modern full-stack personal blog platform." />
    <meta name="twitter:image" content="/logo.svg" />

    <!-- Mobile Status Bar -->
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#09090b" media="(prefers-color-scheme: dark)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="OY Blog" />

    <!-- Performance Hints -->
    <link rel="preconnect" href="https://images.unsplash.com" crossorigin />

    <title>OY Blog - Modern Full-Stack Personal Blog</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
